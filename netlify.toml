[build]
  command = "npm run build"
  publish = "dist"

[[edge_functions]]
  path = "/insights/*"
  function = "inject-meta"

[[edge_functions]]
  path = "/"
  function = "inject-meta"

# Autonomous AI Website duplicates → canonical version
[[redirects]]
  from = "/insights/autonomous-ai-powered-website-web3-context"
  to = "/insights/autonomous-ai-powered-website-web3"
  status = 301
  force = true

[[redirects]]
  from = "/insights/autonomous-ai-powered-web3-website"
  to = "/insights/autonomous-ai-powered-website-web3"
  status = 301
  force = true

[[redirects]]
  from = "/insights/what-is-autonomous-ai-powered-website-web3"
